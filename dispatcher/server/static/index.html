<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatcher</title>
<style>
  :root { color-scheme: light dark;
    --bg: #f6f7f9; --card: #fff; --ink: #1c2733; --dim: #68788c;
    --line: #e3e8ee; --bad: #c0392b; --ok: #1e8e5a; --warn: #b26a00; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #12161b; --card: #1b222b; --ink: #e7edf3;
      --dim: #8fa0b3; --line: #2a3441; } }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--ink);
    font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: var(--dim); margin-bottom: 20px; }
  .grid { display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .card { background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px; cursor: pointer; }
  .card.off { opacity: .55; cursor: default; }
  .card h2 { font-size: 15px; margin-bottom: 6px; }
  .counts { color: var(--dim); font-size: 13px; }
  .warn { color: var(--warn); font-size: 12px; margin-top: 6px; }
  .fresh { color: var(--dim); font-size: 12px; margin-top: 6px; }
  section { margin-top: 28px; }
  section > h2 { font-size: 16px; margin-bottom: 10px; }
  .tablewrap { overflow-x: auto; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--dim); font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  .err { color: var(--bad); }
  .ok { color: var(--ok); }
  td.msg { white-space: normal; word-break: break-word; max-width: 720px; }
  td.msg[data-full] { cursor: pointer; }
  #errors-toggle { background: none; border: 1px solid var(--line);
    color: var(--dim); border-radius: 6px; font: inherit; font-size: 12px;
    padding: 2px 8px; cursor: pointer; margin-left: 8px; vertical-align: 2px; }
  #errors-toggle:hover { color: var(--ink); }
  details > summary { cursor: pointer; list-style: none; }
  details > summary::before { content: "▸ "; color: var(--dim); }
  details[open] > summary::before { content: "▾ "; }
  details > summary h2 { display: inline; }
  details .tablewrap { margin-top: 10px; }
  #errors-count { color: var(--dim); font-weight: 400; }
  #errors-filter { color: var(--dim); font-weight: 400; }
  #errors-clear { background: none; border: none; color: var(--bad);
    cursor: pointer; font: inherit; padding: 0 2px; }
  #errors-service { background: var(--card); border: 1px solid var(--line);
    color: var(--dim); border-radius: 6px; font: inherit; font-size: 12px;
    padding: 2px 6px; margin-left: 8px; vertical-align: 2px; }
  #detail { white-space: pre-wrap; font-family: ui-monospace, monospace;
    font-size: 12px; background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px; max-height: 480px; overflow: auto; }
</style>
</head>
<body>
<h1>Dispatcher</h1>
<div class="sub">Ecosystem overview · auto-refresh 10s ·
  <span id="updated"></span></div>

<div class="grid" id="projects"></div>

<section id="detail-section" hidden>
  <h2>Project detail <span id="detail-name"></span></h2>
  <div id="detail">click a project card…</div></section>

<section><details id="errors-box">
  <summary><h2>Errors <span id="errors-count"></span>
    <span id="errors-filter"></span>
    <select id="errors-service"><option value="">all services</option></select>
    <button id="errors-toggle" type="button">show all</button></h2></summary>
  <div class="tablewrap"><table id="errors">
    <thead><tr><th>Time</th><th>Service</th><th>Message</th></tr></thead>
    <tbody></tbody></table></div></details></section>

<section><h2>Models</h2>
  <div class="tablewrap"><table id="models">
    <thead><tr><th>Project</th><th>Model</th><th>Harness</th><th>Role</th>
      <th>Vendor</th><th>Status</th></tr></thead>
    <tbody></tbody></table></div></section>

<section><h2>Contracts</h2>
  <div class="tablewrap"><table id="contracts">
    <thead><tr><th>Name</th><th>Canon</th><th>Vendored</th><th>Sync</th>
      </tr></thead><tbody></tbody></table></div></section>

<section><h2>Roadmap <span id="roadmap-names" class="sub"></span></h2>
  <div class="tablewrap"><table id="roadmap">
    <thead><tr><th>Phase</th><th>Item</th><th>Owner</th><th>Status</th>
      <th>Contract</th><th>Blockers</th><th>Evidence</th><th>Freshness</th>
      </tr></thead>
    <tbody></tbody></table></div></section>

<script>
const esc = s => String(s ?? "").replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const get = async p => (await fetch(p)).json();

const ERRORS_DAYS_DEFAULT = 14;
const MSG_LIMIT = 160;
let errorsDays = ERRORS_DAYS_DEFAULT;  // null = show all
let errorsProject = null;              // null = all projects
let errorsService = null;              // null = all services
const knownServices = new Set();       // union of services ever seen

function renderServiceOptions() {
  const sel = document.getElementById("errors-service");
  const current = errorsService ?? "";
  sel.innerHTML = `<option value="">all services</option>`
    + [...knownServices].sort().map(s =>
      `<option value="${esc(s)}">${esc(s)}</option>`).join("");
  sel.value = current;
}

function renderErrorsFilter() {
  const box = document.getElementById("errors-filter");
  box.innerHTML = errorsProject === null ? "" :
    `· ${esc(errorsProject)} <button id="errors-clear" type="button">✕</button>`;
}

document.getElementById("projects").addEventListener("click", e => {
  const card = e.target.closest(".card[data-name]");
  if (!card) return;
  errorsProject = card.dataset.name;
  renderErrorsFilter();
  document.getElementById("errors-box").open = true;
  refresh();
  detail(card.dataset.name);
});

document.getElementById("errors-filter").addEventListener("click", e => {
  if (e.target.id !== "errors-clear") return;
  e.preventDefault();
  e.stopPropagation();  // don't collapse the <details>
  errorsProject = null;
  renderErrorsFilter();
  refresh();
});

document.getElementById("errors-toggle").addEventListener("click", e => {
  e.preventDefault();
  e.stopPropagation();  // don't toggle the <details>
  errorsDays = errorsDays === null ? ERRORS_DAYS_DEFAULT : null;
  e.target.textContent =
    errorsDays === null ? `last ${ERRORS_DAYS_DEFAULT} days` : "show all";
  refresh();
});

const serviceSelect = document.getElementById("errors-service");
serviceSelect.addEventListener("click", e => e.stopPropagation());
serviceSelect.addEventListener("change", e => {
  errorsService = e.target.value || null;
  refresh();
});

// Long messages render truncated; click a message cell to expand/collapse.
document.querySelector("#errors tbody").addEventListener("click", e => {
  const td = e.target.closest("td.msg");
  if (!td || td.dataset.full === undefined) return;
  const expanded = td.classList.toggle("expanded");
  td.textContent = expanded ? td.dataset.full : td.dataset.short;
});

async function refresh() {
  try {
    const errorsUrl = "/api/errors?limit=50"
      + (errorsDays === null ? "" : `&days=${errorsDays}`)
      + (errorsProject === null
        ? "" : `&project=${encodeURIComponent(errorsProject)}`)
      + (errorsService === null
        ? "" : `&service=${encodeURIComponent(errorsService)}`);
    const [ov, errors, models, contracts, roadmap] = await Promise.all([
      get("/api/overview"), get(errorsUrl),
      get("/api/models"), get("/api/contracts"), get("/api/roadmap")]);
    document.getElementById("projects").innerHTML = ov.projects.map(p => `
      <div class="card ${p.detected ? "" : "off"}"
           ${p.detected ? `data-name="${esc(p.name)}"` : ""}>
        <h2>${esc(p.name)}</h2>
        ${p.detected
          ? `<div class="counts">tasks ${esc(p.counts.tasks ?? 0)} ·
               models ${esc(p.counts.models ?? 0)} ·
               tests ${esc(p.counts.test_results ?? 0)} ·
               <span class="${p.counts.errors ? "err" : ""}">
                 errors ${esc(p.counts.errors ?? 0)}</span></div>
             <div class="fresh">${esc(p.freshness ?? "freshness unknown")}</div>`
          : `<div class="counts">not detected</div>`}
        ${(p.warnings || []).map(w => `<div class="warn">⚠ ${esc(w)}</div>`)
          .join("")}
      </div>`).join("");
    document.querySelector("#errors tbody").innerHTML = errors.map(e => {
      const full = e.body ?? "";
      const short = full.length > MSG_LIMIT
        ? full.slice(0, MSG_LIMIT) + "…" : full;
      const expandable = short !== full
        ? ` data-full="${esc(full)}" data-short="${esc(short)}"` : "";
      return `
      <tr><td>${esc(e.timestamp ?? "—")}</td><td>${esc(e.service ?? "—")}</td>
      <td class="err msg"${expandable}>${esc(short)}</td></tr>`;
    }).join("")
      || `<tr><td colspan="3" class="ok">no errors 🎉</td></tr>`;
    document.getElementById("errors-count").textContent =
      `(${errors.length})`;
    errors.forEach(e => { if (e.service) knownServices.add(e.service); });
    renderServiceOptions();
    document.querySelector("#models tbody").innerHTML = models.map(m => `
      <tr><td>${esc(m.project)}</td><td>${esc(m.model_id)}</td>
      <td>${esc(m.harness ?? "—")}</td><td>${esc(m.role)}</td>
      <td>${esc(m.vendor ?? "—")}</td><td>${esc(m.status ?? "—")}</td></tr>`)
      .join("");
    document.querySelector("#contracts tbody").innerHTML = contracts.map(c => `
      <tr><td>${esc(c.name)}</td><td>${esc(c.canonical_path)}</td>
      <td>${esc(c.vendored_path || "—")}</td>
      <td class="${c.in_sync === false ? "err" : "ok"}">
        ${c.in_sync === null ? esc(c.detail ?? "n/a")
          : c.in_sync ? "✓ in sync" : "✗ drift"}</td></tr>`).join("");
    const stCls = s => s === "verified" || s === "implemented" ? "ok"
      : s === "blocked" || s === "drift" ? "err" : "";
    // Fold per-copy checker rows: any drifted copy drifts the contract,
    // any not-comparable copy blocks an in-sync verdict (parity with
    // contract_sync_by_name in dispatcher/core/roadmap.py).
    const syncByName = new Map();
    for (const c of contracts) {
      const prev = syncByName.has(c.name) ? syncByName.get(c.name) : c.in_sync;
      syncByName.set(c.name,
        prev === false || c.in_sync === false ? false
        : prev === null || c.in_sync === null ? null : true);
    }
    document.getElementById("roadmap-names").textContent =
      (roadmap.roadmaps || []).join(", ");
    document.querySelector("#roadmap tbody").innerHTML =
      roadmap.items.map(i => {
        const passed = i.evidence.filter(e => e.passed).length;
        const ev = i.evidence.length
          ? `${passed}/${i.evidence.length} rules` : "no rules";
        const tc = i.target_contract;
        const tcSync = tc ? syncByName.get(tc) : undefined;
        const tcCell = !tc ? "—"
          : tcSync === true ? `${tc} ✓ in sync`
          : tcSync === false ? `${tc} ✗ drift` : `${tc} n/a`;
        const tcCls = tcSync === true ? "ok" : tcSync === false ? "err" : "";
        return `
      <tr><td>${esc(i.phase ?? "—")}</td>
      <td title="${esc(i.title)}">${esc(i.id)} ${esc(i.title)}</td>
      <td>${esc(i.owner_project ?? "—")}</td>
      <td class="${stCls(i.computed_status)}">${esc(i.computed_status)}</td>
      <td class="${tcCls}">${esc(tcCell)}</td>
      <td>${esc((i.blockers || []).join(", ") || "—")}</td>
      <td title="${esc(i.evidence.map(e =>
        `${e.passed ? "✓" : "✗"} ${e.rule}: ${e.detail}`).join("\n"))}">
        ${esc(ev)}</td>
      <td class="fresh">${esc(i.last_seen ?? "—")}</td></tr>`;
      }).join("")
      || `<tr><td colspan="8">no roadmap items</td></tr>`;
    document.getElementById("updated").textContent =
      "updated " + new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById("updated").textContent = "refresh failed: " + err;
  }
}

async function detail(name) {
  const section = document.getElementById("detail-section");
  section.hidden = false;
  document.getElementById("detail-name").textContent = "— " + name;
  document.getElementById("detail").textContent = "loading…";
  const snap = await get("/api/projects/" + encodeURIComponent(name));
  document.getElementById("detail").textContent =
    JSON.stringify(snap, null, 2);
  section.scrollIntoView({behavior: "smooth", block: "nearest"});
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
